<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年間最高気温 比較アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 全体のレイアウト設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f8f9fa;
        }

        /* 左側のコントロールパネル */
        .sidebar {
            width: 320px;
            background-color: #ffffff;
            padding: 30px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar h1 {
            font-size: 20px;
            color: #333;
            margin: 0 0 10px 0;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            background-color: #fff;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: #007bff;
        }

        /* 右側のグラフエリア */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }

        .chart-wrapper {
            flex-grow: 1;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>気温データ設定</h1>
        
        <div class="form-group">
            <label for="locationSelect">📍 場所 (アメダス)</label>
            <select id="locationSelect">
                <option value="sapporo">札幌</option>
                <option value="tokyo" selected>東京</option>
                <option value="osaka">大阪</option>
                <option value="naha">那覇</option>
            </select>
        </div>

        <div class="form-group">
            <label for="baseYearSelect">📅 対象期間 (年)</label>
            <select id="baseYearSelect">
                <option value="2023" selected>2023年</option>
                <option value="2022">2022年</option>
                <option value="2021">2021年</option>
            </select>
        </div>

        <div class="form-group">
            <label for="compareYearSelect">🔄 比較したい年</label>
            <select id="compareYearSelect">
                <option value="none">-- 比較しない --</option>
                <option value="2023">2023年</option>
                <option value="2022">2022年</option>
                <option value="2021">2021年</option>
                <option value="2020" selected>2020年</option>
                <option value="2010">2010年</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-wrapper">
            <canvas id="temperatureChart"></canvas>
        </div>
    </div>

    <script>
        // --- モックデータ（気象庁のデータを模したダミーデータ） ---
        // 実際の運用ではAPI等から取得する処理に置き換えてください。
        const mockData = {
            sapporo: {
                base: [ -0.9, 0.1, 4.0, 11.5, 17.3, 21.5, 24.9, 26.4, 22.4, 16.2, 8.5, 2.1 ],
                variation: 2 // 年ごとのブレ幅
            },
            tokyo: {
                base: [ 9.6, 10.4, 13.6, 19.0, 22.9, 25.5, 29.2, 30.8, 26.9, 21.5, 16.3, 11.9 ],
                variation: 2.5
            },
            osaka: {
                base: [ 9.5, 10.2, 13.7, 19.9, 24.5, 27.8, 31.6, 33.4, 29.3, 23.3, 17.6, 12.3 ],
                variation: 2.5
            },
            naha: {
                base: [ 19.5, 19.8, 21.7, 24.1, 26.7, 29.4, 31.8, 31.5, 30.4, 27.9, 24.6, 21.2 ],
                variation: 1.5
            }
        };

        // 指定した場所・年のダミーデータを生成する関数
        function generateData(location, year) {
            const baseData = mockData[location].base;
            const variation = mockData[location].variation;
            // 年の数字を使って疑似乱数的にデータをずらす
            const seed = parseInt(year);
            return baseData.map((temp, index) => {
                const randomOffset = Math.sin(seed + index) * variation;
                return (temp + randomOffset).toFixed(1); // 小数第1位まで
            });
        }

        // --- グラフの初期化 ---
        const ctx = document.getElementById('temperatureChart').getContext('2d');
        let tempChart;

        function renderChart() {
            const location = document.getElementById('locationSelect').value;
            const locationName = document.getElementById('locationSelect').options[document.getElementById('locationSelect').selectedIndex].text;
            
            const baseYear = document.getElementById('baseYearSelect').value;
            const compareYear = document.getElementById('compareYearSelect').value;

            // データ取得
            const baseData = generateData(location, baseYear);
            
            // データセットの構成
            const datasets = [{
                label: `${locationName} - ${baseYear}年 最高気温 (℃)`,
                data: baseData,
                borderColor: 'rgba(255, 50, 50, 1)', // 赤色
                backgroundColor: 'rgba(255, 50, 50, 0.1)',
                borderWidth: 3,
                pointBackgroundColor: 'rgba(255, 50, 50, 1)',
                pointRadius: 4,
                fill: true,
                tension: 0.3 // 曲線を滑らかに
            }];

            // 比較年が選択されている場合、データセットを追加
            if (compareYear !== "none") {
                const compareData = generateData(location, compareYear);
                datasets.push({
                    label: `${locationName} - ${compareYear}年 最高気温 (℃)`,
                    data: compareData,
                    borderColor: 'rgba(54, 162, 235, 1)', // 青色（別の色）
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    borderWidth: 3,
                    borderDash: [5, 5], // 比較用は点線にして見やすく
                    pointBackgroundColor: 'rgba(54, 162, 235, 1)',
                    pointRadius: 4,
                    fill: false,
                    tension: 0.3
                });
            }

            // 既存のグラフがあれば破棄して再描画
            if (tempChart) {
                tempChart.destroy();
            }

            tempChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { font: { size: 14 } }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        y: {
                            title: {
                                display: true,
                                text: '気温 (℃)',
                                font: { size: 14 }
                            },
                            suggestedMin: -10, // メモリの最小値の目安
                            suggestedMax: 40   // メモリの最大値の目安
                        },
                        x: {
                            title: {
                                display: true,
                                text: '月',
                                font: { size: 14 }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // --- イベントリスナーの設定 ---
        // プルダウンが変更されたらグラフを再描画
        document.getElementById('locationSelect').addEventListener('change', renderChart);
        document.getElementById('baseYearSelect').addEventListener('change', renderChart);
        document.getElementById('compareYearSelect').addEventListener('change', renderChart);

        // 初回描画の実行
        renderChart();
    </script>
</body>
</html>
