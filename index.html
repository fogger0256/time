<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報マッピングアプリ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 15px; background: #2c3e50; color: white; text-align: center; }
        header h2 { margin: 0; font-size: 1.5rem; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; padding: 20px; background: #f8f9fa; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex: 1; z-index: 1; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 0.9rem; font-weight: bold; color: #333; }
        ul { list-style: none; padding: 0; margin: 0; }
        
        /* リストのスタイル調整 */
        li { padding: 12px; background: white; margin-bottom: 8px; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; border-left: 5px solid transparent; transition: all 0.2s; font-size: 0.9rem; }
        li:hover { background: #e9ecef; border-color: #adb5bd; }
        
        /* 選択されたリスト項目のスタイル */
        li.selected { background: #e8f4fd; border-color: #b6d4fe; border-left: 5px solid #3498db; }
        li.selected:hover { background: #d1e7dd; }

        input[type="datetime-local"] { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; padding: 10px; font-size: 1rem; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        #status-msg { font-size: 0.9rem; font-weight: bold; }
        .loading { color: #e67e22; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .instruction { font-size: 0.85rem; color: #666; margin-top: -5px; }
    </style>
</head>
<body>
    <header>
        <h2>地震情報マッピングアプリ (比較モード)</h2>
    </header>
    <div id="main">
        <div id="sidebar">
            <div id="status-msg" class="loading">気象庁からデータを取得中...</div>
            
            <div class="control-group">
                <label>開始日時</label>
                <input type="datetime-local" id="start-time">
            </div>
            <div class="control-group">
                <label>終了日時</label>
                <input type="datetime-local" id="end-time">
            </div>
            <button id="search-btn">この期間で検索</button>
            <div class="instruction">※リストをクリックで複数選択・解除できます。</div>
            <hr style="width: 100%; border: 0; border-top: 1px solid #ddd;">
            
            <ul id="earthquake-list">
                </ul>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = []; // 地図上の丸(マーカー)を管理する配列
        let earthquakeData = []; // 取得した地震データ全体
        let selectedEarthquakes = new Set(); // 選択された地震データを保持(重複を防ぐためSetを使用)

        // 1. 地図の初期化
        function initMap() {
            map = L.map('map').setView([36.2048, 138.2529], 5); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
        }

        // 2. 気象庁のAPIから地震情報を取得
        async function fetchJmaData() {
            try {
                const res = await fetch('https://www.jma.go.jp/bosai/quake/data/list.json');
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                earthquakeData = data;
                
                const statusEl = document.getElementById('status-msg');
                statusEl.innerText = `データ取得完了（全${data.length}件）`;
                statusEl.className = 'success';
            } catch (error) {
                const statusEl = document.getElementById('status-msg');
                statusEl.innerText = 'データ取得に失敗しました';
                statusEl.className = 'error';
                console.error(error);
            }
        }

        // 3. 座標フォーマット変換 (+35.6+139.7-40000/ -> lat, lng)
        function parseCoordinate(cod) {
            if (!cod) return null;
            const match = cod.match(/^([+-]?\d+(?:\.\d+)?)([+-]?\d+(?:\.\d+)?)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            return null;
        }

        // 4. 日付のフォーマット変換
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${year}/${month}/${day} ${hours}:${minutes}`;
        }

        // 5. 検索とリスト表示
        function searchEarthquakes() {
            const startStr = document.getElementById('start-time').value;
            const endStr = document.getElementById('end-time').value;
            
            const startTime = startStr ? new Date(startStr).getTime() : 0;
            const endTime = endStr ? new Date(endStr).getTime() : Infinity;

            const listEl = document.getElementById('earthquake-list');
            listEl.innerHTML = '';
            
            // 検索し直した時は選択状態と地図上の丸をリセットする
            selectedEarthquakes.clear(); 
            clearMap();

            const filteredData = earthquakeData.filter(eq => {
                const eqTime = new Date(eq.at).getTime();
                return eqTime >= startTime && eqTime <= endTime;
            });

            if (filteredData.length === 0) {
                listEl.innerHTML = '<li>該当する地震データがありません。</li>';
                return;
            }

            filteredData.forEach(eq => {
                const li = document.createElement('li');
                const formattedDate = formatDate(eq.at);
                const mag = eq.mag !== "" ? `M${eq.mag}` : 'M不明';
                const place = eq.anm || '場所不明';

                li.innerHTML = `<strong>${formattedDate}</strong><br>${place} (${mag})`;
                
                // リスト項目をクリックしたときのトグル（選択/解除）処理
                li.onclick = () => {
                    if (selectedEarthquakes.has(eq)) {
                        selectedEarthquakes.delete(eq); // 選択解除
                        li.classList.remove('selected');
                    } else {
                        selectedEarthquakes.add(eq); // 選択
                        li.classList.add('selected');
                    }
                    plotEarthquakes(); // 地図を更新
                };
                listEl.appendChild(li);
            });
        }

        // 地図上の丸をすべて消す関数
        function clearMap() {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
        }

        // 6. 選択されたすべての地震を地図上に丸でプロット
        function plotEarthquakes() {
            clearMap(); // 一度すべて消す

            if (selectedEarthquakes.size === 0) return;

            let bounds = []; // 全ての丸が収まる範囲を計算するための配列

            selectedEarthquakes.forEach(eq => {
                const coords = parseCoordinate(eq.cod);
                if (!coords) return;

                const formattedDate = formatDate(eq.at);
                const magVal = parseFloat(eq.mag);
                const magText = isNaN(magVal) ? 'M不明' : `M${eq.mag}`;
                
                // ポップアップテキスト
                const popupText = `<div style="font-size:14px;"><strong>${formattedDate}</strong><br>マグニチュード: <strong>${magText}</strong><br>${eq.anm || ''}</div>`;

                // マグニチュードに応じた丸の半径（M不明の場合は固定値）
                // 指数関数的に大きさを変えることで地震の規模を直感的に表現
                const radius = isNaN(magVal) ? 5 : Math.max(3, magVal * 2.5);

                // ピン(L.marker)の代わりに丸(L.circleMarker)を使用
                const circle = L.circleMarker([coords.lat, coords.lng], {
                    radius: radius,
                    color: '#e74c3c',       // 枠線の色
                    weight: 2,              // 枠線の太さ
                    fillColor: '#ff7675',   // 塗りつぶしの色
                    fillOpacity: 0.6        // 塗りつぶしの透明度
                }).addTo(map);

                circle.bindPopup(popupText);
                markers.push(circle);
                bounds.push([coords.lat, coords.lng]); // 座標を記録
            });

            // 選択された丸が全て地図上に収まるようにズームと位置を自動調整
            if (bounds.length > 0) {
                // paddingを設定して画面端ギリギリにならないようにする
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 8 });
            }
        }

        // イベントリスナーの登録
        document.getElementById('search-btn').addEventListener('click', searchEarthquakes);
        
        window.onload = () => {
            initMap();
            fetchJmaData();
        };
    </script>
</body>
</html>
